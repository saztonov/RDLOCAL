# =====================================================
# Конфигурация Remote OCR сервера
# =====================================================
# Приоритет: ENV переменные > значения из этого файла
# Секреты (API ключи, URL-ы) задаются ТОЛЬКО через .env
# Путь к конфигу можно переопределить через ENV OCR_CONFIG_PATH

# ===== CELERY WORKER =====
# Количество параллельных Celery задач
max_concurrent_jobs: 4
# Сколько задач брать заранее (1 = по одной)
worker_prefetch: 1
# Перезапуск воркера после N задач (защита от утечек памяти)
# Низкое значение = агрессивный recycling процессов для предотвращения memory carry-over
worker_max_tasks: 5
# Soft таймаут задачи, секунды (предупреждение)
task_soft_timeout: 3600
# Hard таймаут задачи, секунды (принудительное завершение)
task_hard_timeout: 4200
# Количество повторов при ошибке
task_max_retries: 3
# Задержка между повторами, секунды
task_retry_delay: 60

# ===== ЗАЩИТА ОТ ЗАЦИКЛИВАНИЯ =====
# Максимальное время выполнения одной задачи в часах
job_max_runtime_hours: 2
# Максимальное количество попыток (защита от бесконечного зацикливания)
job_max_retries: 3

# ===== OCR THREADING =====
# Глобальный лимит параллельных OCR запросов (все задачи)
max_global_ocr_requests: 8
# Потоков OCR внутри одной задачи
ocr_threads_per_job: 2
# Таймаут одного OCR запроса, секунды
ocr_request_timeout: 480

# ===== DATALAB API =====
# Максимум запросов в минуту к Datalab
datalab_max_rpm: 180
# Параллельных запросов к Datalab
datalab_max_concurrent: 5
# Интервал между проверками статуса задачи в Datalab, секунды
datalab_poll_interval: 3
# Максимум попыток проверки статуса (90 x 3сек = ~4.5 мин)
datalab_poll_max_attempts: 90
# Количество повторов при ошибке Datalab API
datalab_max_retries: 3
# Дополнительные фичи Datalab (comma-separated: table_row_bboxes, chart_understanding, etc.)
datalab_extras: "table_row_bboxes"
# Порог качества для retry (0-5, ниже порога = повторный запрос с skip_cache)
datalab_quality_threshold: 2.0

# ===== CHANDRA (LM Studio) =====
# Параллельных запросов к Chandra PER TASK
# При N воркерах LM Studio нужно Max Concurrent Predictions >= chandra_max_concurrent * N
# Пример: 2 воркера × 2 = 4 одновременных запроса к LM Studio
chandra_max_concurrent: 2
# Пауза между retry при верификации блоков, секунды
chandra_retry_delay: 2

# ===== QWEN (LM Studio) =====
# Параллельных запросов к Qwen PER TASK
# LM Studio: Max Concurrent Predictions >= qwen_max_concurrent * num_workers
qwen_max_concurrent: 4
# Пауза между retry при верификации блоков, секунды
qwen_retry_delay: 2

# ===== ВЕРИФИКАЦИЯ БЛОКОВ =====
# Максимум блоков для retry верификации (0 = без лимита)
max_retry_blocks: 0
# Таймаут верификации в минутах (0 = без лимита)
# Для LM Studio (ngrok) минимум 30 мин гарантируется в коде
verification_timeout_minutes: 30

# ===== НАСТРОЙКИ OCR =====
# Сжатие PNG (0=без сжатия, 9=максимальное)
crop_png_compress: 6
# Максимум блоков в одном batch запросе
max_ocr_batch_size: 5
# DPI рендеринга PDF (влияет на качество и размер)
pdf_render_dpi: 300
# Максимальная высота полосы (strips), пиксели
max_strip_height: 9000

# ===== ДИНАМИЧЕСКИЙ ТАЙМАУТ =====
# Базовое время на инициализацию задачи, секунды
dynamic_timeout_base: 300
# Время на обработку одного блока, секунды
seconds_per_block: 30
# Минимальный таймаут задачи, секунды
min_task_timeout: 600
# Максимальный таймаут задачи, секунды
max_task_timeout: 14400

# ===== ОЧЕРЕДЬ =====
# Интервал проверки очереди, секунды
poll_interval: 10.0
# Максимальный интервал при backoff, секунды
poll_max_interval: 60.0
# Максимальный размер очереди Redis
max_queue_size: 100
# Приоритет задач по умолчанию (1=высший, 10=низший)
default_task_priority: 5

# ===== МОДЕЛИ OCR ПО УМОЛЧАНИЮ =====
# Движок по умолчанию: datalab | chandra | openrouter
default_engine: "datalab"
# Модель для распознавания изображений (OpenRouter)
default_image_model: "google/gemini-3.1-flash-lite-preview"
# Модель для распознавания штампов (OpenRouter)
default_stamp_model: "qwen/qwen3.5-9b"

# =====================================================
# ПРОМПТЫ ДЛЯ OCR
# =====================================================
# Переменные: {DOC_NAME}, {PAGE_NUM}, {BLOCK_ID}, {OPERATOR_HINT}, {PDFPLUMBER_TEXT}

# -- OpenRouter / Gemini: IMAGE blocks (default category) --
openrouter_image_system_prompt: |
  You extract evidence from one image tile of a Russian construction document.
  Your goal is stable machine-readable JSON for indexing and OCR support.

  Evidence priority:
  1) Image content.
  2) raw_pdfplumber_text only when it clearly matches visible content inside this exact tile.
  3) operator_hint only as soft context; never let it override visible evidence.

  Rules:
  - Do not guess missing characters, numbers, codes, stages, sections, dimensions, or elevations.
  - Preserve text exactly as shown in the source: Russian, Latin, digits, units, and symbols.
  - Do not translate or normalize.
  - Use only content that belongs to this exact tile.
  - Return exactly one JSON object. No Markdown. No wrapper key.

  Fallback values:
  - location.grid_lines = "Не определены"
  - location.zone_name = "Не определено"
  - content_summary = ""
  - detailed_description = ""
  - clean_ocr_text = ""
  - key_entities = []

  JSON schema:
  {
    "location": {
      "grid_lines": "string",
      "zone_name": "План этажа | Схема | Разрез | Фасад | Узел | Спецификация | Экспликация | Легенда | Штамп | Примечания | График | Не определено"
    },
    "content_summary": "string",
    "detailed_description": "string",
    "clean_ocr_text": "string",
    "key_entities": ["string"]
  }

  Field rules:
  - location.grid_lines: only visible axes / coordinate references from this tile.
  - location.zone_name: choose only from the enum.
  - content_summary: one short sentence in Russian; confirmed facts only.
  - detailed_description: 3-5 short sentences in Russian; describe only observable geometry, line types, hatching, callouts, arrows, dimensions, elevations, and visible relationships between elements. No conclusions.
  - clean_ocr_text: only confirmed local text belonging to this tile. Prefer the image. Use raw_pdfplumber_text only to repair obvious OCR confusions for text clearly visible in this tile.
  - key_entities: up to 25 unique visible marks, positions, dimensions, elevations, Ø/DN values, and codes.

openrouter_image_user_prompt: |
  <context>
  DOC_NAME: {DOC_NAME}
  PAGE_NUM: {PAGE_NUM}
  BLOCK_ID: {BLOCK_ID}
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  Analyze only the attached image tile.

  Tasks:
  1) Determine location.zone_name and location.grid_lines if directly visible.
  2) Write content_summary.
  3) Write detailed_description (3-5 sentences strictly describing visual geometry, lines, and relationships).
  4) Extract key_entities (up to 25 readable marks, codes, dimensions).
  5) Extract clean_ocr_text only with text that belongs to this exact tile.
  6) If the tile is mostly graphical and no text can be reliably attributed, keep clean_ocr_text empty.

  Return exactly one JSON object matching the system schema.

# -- OpenRouter / Gemini: STAMP blocks --
openrouter_stamp_system_prompt: |
  You extract fields from one title block / construction stamp from Russian project documentation.
  Accuracy of structured fields is more important than prose.

  Evidence priority:
  1) Image: cell boundaries, row alignment, handwriting, signatures, handwritten dates.
  2) raw_pdfplumber_text: printed text, document codes, project names, organization names, if it clearly belongs to this stamp.
  3) operator_hint: soft hint only. Never let it override visible or raw evidence.

  Rules:
  - Preserve text exactly as written: Russian, Latin, digits, symbols.
  - Do not translate, normalize, or expand abbreviations.
  - Do not guess document codes, sheet numbers, surnames, dates, total sheets, or revisions.
  - Use null for missing or unresolved fields.
  - Return exactly one JSON object. No Markdown.

  JSON schema:
  {
    "document_code": "string|null",
    "project_name": "string|null",
    "sheet_name": "string|null",
    "stage": "string|null",
    "sheet_number": "string|null",
    "total_sheets": "string|null",
    "organization": "string|null",
    "signatures": [{"role": "string|null", "surname": "string|null", "date": "string|null"}],
    "revisions": [{"change_num": "string|null", "doc_num": "string|null", "date": "string|null"}]
  }

  Field rules:
  - document_code: exact printed or handwritten code, no correction beyond obvious character disambiguation.
  - project_name, sheet_name, organization: exact text as written.
  - stage: exact visible stage mark (П, Р, РД), only if visible.
  - sheet_number / total_sheets: keep as strings exactly as shown.
  - signatures: include only visible rows.
  - revisions: include only visible revision entries.

openrouter_stamp_user_prompt: |
  <context>
  DOC_NAME: {DOC_NAME}
  PAGE_NUM: {PAGE_NUM}
  BLOCK_ID: {BLOCK_ID}
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  Analyze the attached image of one construction title block.

  Tasks:
  1) Map visible stamp content to the JSON fields.
  2) Use the image to determine which text belongs to which field.
  3) Use raw_pdfplumber_text only to correct obvious OCR errors in printed text that clearly belongs to this stamp.
  4) Extract handwritten names and dates only if they are visible.
  5) If a field is cropped, hidden, or ambiguous, return null.

  Return exactly one JSON object matching the system schema.

# -- Qwen: TEXT/TABLE blocks --
qwen_text_system_prompt: |
  You are an OCR transcription model for Russian construction documents.
  Your task is to transcribe one block exactly and reconstruct its local layout in HTML.

  Rules:
  - Preserve text exactly as shown: Russian, Latin, digits, units, punctuation, and technical symbols (Ø, ±, №, %, x, ×, /, -, superscripts, subscripts).
  - Do not guess missing characters, numbers, units, references, or table cells.
  - Do not translate, normalize, expand abbreviations, or explain.
  - Reading order: top-to-bottom, left-to-right inside the block.
  - Keep only content from this block.
  - Return exactly one JSON object. No Markdown. No commentary. No <think> blocks.

  JSON schema:
  {"type":"text"|"table"|"mixed","content_html":"string","confidence":0.0}

  HTML rules for content_html:
  - Text paragraphs: <p>...</p>
  - Tables: <table><tr><td>...</td></tr></table>
  - Use rowspan/colspan only when clearly visible. Use SINGLE QUOTES for HTML attributes to prevent breaking JSON (e.g., <td colspan='2'>).
  - Use <br> only for meaningful visual line breaks.
  - Use <math>...</math> only for clearly visible formulas.
  - Keep blank cells blank; do not fill from neighboring cells.
  - Preserve original row/column order.

  Confidence rubric:
  - 0.90-1.00: almost everything is clearly readable
  - 0.70-0.89: minor ambiguity
  - 0.40-0.69: several unclear fragments
  - 0.00-0.39: heavily unreadable block

qwen_text_user_prompt: |
  Analyze only the attached block.

  Steps:
  1) Decide whether the block is text, table, or mixed.
  2) Transcribe all visible content exactly.
  3) Reconstruct the local layout in content_html. Use SINGLE QUOTES inside HTML attributes.
  4) For tables, preserve row order, column order, and merged cells only when clearly visible.
  5) For formulas, preserve symbols and indices exactly.
  6) If some fragments are unreadable, keep only the readable fragments and do not invent the missing parts.

  Return exactly one JSON object matching the system schema.

# -- Qwen: STAMP blocks --
qwen_stamp_system_prompt: |
  You are an OCR extractor for Russian construction title blocks (основные надписи).
  Structured field accuracy has higher priority than stamp_html reconstruction.

  Rules:
  - Preserve original text exactly as written: Russian, Latin, digits, symbols.
  - Do not guess missing sheet numbers, dates, surnames, scales, formats, or codes.
  - Do not translate or normalize.
  - Use the image for layout, signatures, handwritten surnames, and handwritten dates.
  - Return exactly one JSON object. No Markdown. No commentary. No <think> blocks.

  JSON schema:
  {
    "organization": "",
    "project_name": "",
    "project_code": "",
    "document_name": "",
    "stage": "",
    "sheet_number": "",
    "total_sheets": "",
    "scale": "",
    "format": "",
    "signatures": [{"role": "", "name": "", "date": ""}],
    "changes": [{"number": "", "name": "", "date": ""}],
    "stamp_html": "<table>...</table>",
    "confidence": 0.0
  }

  Additional rules:
  - If a scalar field is unresolved, use an empty string.
  - signatures: include only visible rows.
  - changes: include only visible revision rows.
  - stamp_html: reproduce only clearly visible cell structure. Use SINGLE QUOTES for HTML attributes.
  - Field accuracy is more important than perfect stamp_html reconstruction.

qwen_stamp_user_prompt: |
  This image contains one construction title block.

  Tasks:
  1) Extract all visible metadata into the structured fields.
  2) Reconstruct the title-block layout in stamp_html. Use SINGLE QUOTES inside HTML attributes.
  3) Preserve handwritten names and dates only if visible.
  4) Do not infer hidden, cropped, or ambiguous fields.
  5) Keep all codes, scales, sheet numbers, and format values exactly as shown.

  Return exactly one JSON object matching the system schema.
