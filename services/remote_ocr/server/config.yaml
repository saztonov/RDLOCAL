# =====================================================
# Конфигурация Remote OCR сервера
# =====================================================
# Приоритет: ENV переменные > значения из этого файла
# Секреты (API ключи, URL-ы) задаются ТОЛЬКО через .env
# Путь к конфигу можно переопределить через ENV OCR_CONFIG_PATH

# ===== CELERY WORKER =====
# Количество параллельных Celery задач
max_concurrent_jobs: 4
# Сколько задач брать заранее (1 = по одной)
worker_prefetch: 1
# Перезапуск воркера после N задач (защита от утечек памяти)
worker_max_tasks: 100
# Soft таймаут задачи, секунды (предупреждение)
task_soft_timeout: 3600
# Hard таймаут задачи, секунды (принудительное завершение)
task_hard_timeout: 4200
# Количество повторов при ошибке
task_max_retries: 3
# Задержка между повторами, секунды
task_retry_delay: 60

# ===== ЗАЩИТА ОТ ЗАЦИКЛИВАНИЯ =====
# Максимальное время выполнения одной задачи в часах
job_max_runtime_hours: 2
# Максимальное количество попыток (защита от бесконечного зацикливания)
job_max_retries: 3

# ===== OCR THREADING =====
# Глобальный лимит параллельных OCR запросов (все задачи)
max_global_ocr_requests: 8
# Потоков OCR внутри одной задачи
ocr_threads_per_job: 2
# Таймаут одного OCR запроса, секунды
ocr_request_timeout: 480

# ===== DATALAB API =====
# Максимум запросов в минуту к Datalab
datalab_max_rpm: 180
# Параллельных запросов к Datalab
datalab_max_concurrent: 5
# Интервал между проверками статуса задачи в Datalab, секунды
datalab_poll_interval: 3
# Максимум попыток проверки статуса (90 x 3сек = ~4.5 мин)
datalab_poll_max_attempts: 90
# Количество повторов при ошибке Datalab API
datalab_max_retries: 3
# Дополнительные фичи Datalab (comma-separated: table_row_bboxes, chart_understanding, etc.)
datalab_extras: "table_row_bboxes"
# Порог качества для retry (0-5, ниже порога = повторный запрос с skip_cache)
datalab_quality_threshold: 2.0

# ===== CHANDRA (LM Studio) =====
# Параллельных запросов к Chandra PER TASK
# При N воркерах LM Studio нужно Max Concurrent Predictions >= chandra_max_concurrent * N
# Пример: 2 воркера × 2 = 4 одновременных запроса к LM Studio
chandra_max_concurrent: 2
# Пауза между retry при верификации блоков, секунды
chandra_retry_delay: 2

# ===== QWEN (LM Studio) =====
# Параллельных запросов к Qwen PER TASK
# LM Studio: Max Concurrent Predictions >= qwen_max_concurrent * num_workers
qwen_max_concurrent: 4
# Пауза между retry при верификации блоков, секунды
qwen_retry_delay: 2

# ===== ВЕРИФИКАЦИЯ БЛОКОВ =====
# Максимум блоков для retry верификации (0 = без лимита)
max_retry_blocks: 0
# Таймаут верификации в минутах (0 = без лимита)
# Для LM Studio (ngrok) минимум 30 мин гарантируется в коде
verification_timeout_minutes: 30

# ===== НАСТРОЙКИ OCR =====
# Сжатие PNG (0=без сжатия, 9=максимальное)
crop_png_compress: 6
# Максимум блоков в одном batch запросе
max_ocr_batch_size: 5
# DPI рендеринга PDF (влияет на качество и размер)
pdf_render_dpi: 300
# Максимальная высота полосы (strips), пиксели
max_strip_height: 9000

# ===== ДИНАМИЧЕСКИЙ ТАЙМАУТ =====
# Базовое время на инициализацию задачи, секунды
dynamic_timeout_base: 300
# Время на обработку одного блока, секунды
seconds_per_block: 30
# Минимальный таймаут задачи, секунды
min_task_timeout: 600
# Максимальный таймаут задачи, секунды
max_task_timeout: 14400

# ===== ОЧЕРЕДЬ =====
# Интервал проверки очереди, секунды
poll_interval: 10.0
# Максимальный интервал при backoff, секунды
poll_max_interval: 60.0
# Максимальный размер очереди Redis
max_queue_size: 100
# Приоритет задач по умолчанию (1=высший, 10=низший)
default_task_priority: 5

# ===== МОДЕЛИ OCR ПО УМОЛЧАНИЮ =====
# Движок по умолчанию: datalab | chandra | openrouter
default_engine: "datalab"
# Модель для распознавания изображений (OpenRouter)
default_image_model: "google/gemini-3.1-flash-lite-preview"
# Модель для распознавания штампов (OpenRouter)
default_stamp_model: "qwen/qwen3.5-9b"

# =====================================================
# ПРОМПТЫ ДЛЯ OCR
# =====================================================
# Переменные: {DOC_NAME}, {PAGE_NUM}, {BLOCK_ID}, {OPERATOR_HINT}, {PDFPLUMBER_TEXT}

# -- OpenRouter: IMAGE blocks (default category) --
openrouter_image_system_prompt: |
  You are an expert analyst of Russian construction documentation (CAD, detailed design / РД, preliminary design / стадия П). Your task is to extract indexing features from the provided image tile/crop and its context.

  <priorities>
  1) Vision first: if operator_hint or pdfplumber_text contradict the image, trust the image.
  2) No guessing: do not "complete" ambiguous text/numbers and do not draw conclusions without direct visual evidence.
  3) Use pdfplumber_text only when it clearly belongs to this tile (matching visible marks/positions/axes/headings/labels). Otherwise leave clean_ocr_text empty or include only confirmed fragments.
  4) Stage (П/РД) and section (АР/КР/ОВ/ВК/ЭОМ/СС) — specify only if there are direct visible signs (stamp/inscription/marks). If none — omit.
  </priorities>

  <output_format>
  Return ONLY a single valid JSON object "analysis" (no Markdown, no explanations, no extra keys).
  All text values in the JSON MUST be in Russian.
  If unknown: grid_lines = "Не определены", zone_name = "Не определено", strings = "", arrays = [].

  Schema:
  {
    "location": {
      "grid_lines": "Axes (e.g. '1-3/А-Б') or 'Не определены'",
      "zone_name": "ONE OF: План этажа | Схема | Разрез | Фасад | Узел | Спецификация | Экспликация | Легенда | Штамп | Примечания | График | Не определено"
    },
    "content_summary": "1-2 sentences in Russian: drawing type + (if visible) section/stage. Only confirmed evidence.",
    "detailed_description": "3-5 sentences in Russian. Only observable: line types (solid/dashed/dash-dot), outlines, hatching (if type unclear — 'штриховка присутствует, тип неразличим'), callouts, arrows, dimensions, elevation marks, detail references. Include topology (adjacency/intersection/callout targets). No conclusions.",
    "clean_ocr_text": "Only from relevant pdfplumber_text: remove junk line breaks/duplicates, join broken words. Do not add anything missing. If no relevant text — empty string.",
    "key_entities": ["Up to 25 unique entities (marks/positions/Ø/DN/dimensions/elevations/codes). Confirmed only. No duplicates."]
  }
  </output_format>

openrouter_image_user_prompt: |
  <context>
  DOC_NAME: {DOC_NAME}
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  <task>
  Based on the image tile:
  1) Determine zone_name and (if visible) grid_lines.
  2) Fill content_summary in Russian (РД/стадия П allowed; specify section only by visible marks/evidence).
  3) Fill detailed_description (5-10 sentences in Russian) — geometry/line types/hatching/callouts/dimensions/elevations + element relationships.
  4) Fill key_entities (up to 25) — readable marks/positions/Ø/DN/dimensions/elevations/codes (including those typical for стадия П/РД, if VISIBLE).
  5) clean_ocr_text — only from relevant raw_pdfplumber_text; if attribution is uncertain — leave empty.

  Return only a valid JSON object "analysis" per the system schema. No Markdown.
  </task>

# -- OpenRouter: STAMP blocks --
openrouter_stamp_system_prompt: |
  You are an expert OCR and data extraction AI specialized in Russian construction documentation (GOST). Your task is to extract data from the provided image of a title block and output strict JSON.
  All extracted text values MUST be preserved in their original language (Russian).

  ### DATA SOURCE HIERARCHY & RULES:
  1.  **Operator Hint (`<context>`):** Highest priority. If the operator explicitly states a value (e.g., "Sheet number is 5"), use it, overriding visual data.
  2.  **Raw Text (`<raw_pdfplumber_text>`):** Ground truth for PRINTED text. Use it to fix OCR errors (spelling, confusing characters like 0/O or 3/З) in document codes, project names, and organization names.
      * *Note:* Raw text is unstructured and often lacks handwriting. Use the image to determine which text belongs to which field.
  3.  **Image (Visuals):** Use the image to understand the table layout, row/column alignment, and to extract HANDWRITTEN text (signatures, dates) which is missing from the raw text.

  ### JSON OUTPUT SCHEMA:
  Output a single JSON object with this structure (use `null` for missing fields):
  {
    "document_code": "String. Document code (Шифр). Use raw text for precision.",
    "project_name": "String. Name of the construction object (in Russian as written).",
    "sheet_name": "String. Title of the drawing (in Russian as written).",
    "stage": "String. Project stage (П, Р, etc.).",
    "sheet_number": "String. Current sheet number (Лист).",
    "total_sheets": "String. Total sheets (Листов).",
    "organization": "String. Company name (in Russian as written).",
    "signatures": [
      {
        "role": "String (e.g. Разраб., Пров., ГИП)",
        "surname": "String (handwritten or printed, in Russian)",
        "date": "String (DD.MM.YY)"
      }
    ],
    "revisions": [
      {
        "change_num": "String (Изм.)",
        "doc_num": "String (№ док.)",
        "date": "String"
      }
    ]
  }

openrouter_stamp_user_prompt: |
  Analyze the attached image of the construction title block.

  <context>
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  ### INSTRUCTIONS:
  1. Map the content from the image and <raw_pdfplumber_text> to the JSON schema.
  2. If <raw_pdfplumber_text> contains garbage or is empty, rely solely on the image.
  3. Pay special attention to handwritten signatures (visible only in the image).
  4. Preserve all Russian text exactly as written (do not translate names, titles, roles).
  5. Output ONLY valid JSON.

# -- Qwen: TEXT/TABLE blocks --
qwen_text_system_prompt: |
  You are a specialized OCR system for recognizing Russian construction documentation: GOST, SNiP, SP, TU, working drawings (РД), preliminary design (стадия П). Your task is to recognize the content of the provided block with maximum accuracy. Preserve all dimensions, units of measurement, reference numbers, and table structure with absolute precision. Output the result STRICTLY in JSON format. No text outside JSON. All recognized text content MUST be in Russian (as it appears in the original document).

qwen_text_user_prompt: |
  Carefully analyze the structure of the provided block from a construction drawing or specification.

  This is a fragment of technical documentation (working documentation / стадия П). The block may contain:
  — text paragraphs with technical requirements
  — specification tables with dimensions, materials, quantities
  — notes and references to regulatory documents (ГОСТ, СНиП, СП)
  — mathematical formulas, indices, exponents

  Recognize all text with maximum accuracy, preserving the original structure. All recognized text must remain in Russian as it appears in the document.

  Return the result STRICTLY as a JSON object:
  {"type": "text"|"table"|"mixed", "content_html": "<p>...</p> or <table>...</table>", "confidence": 0.0-1.0}

  Rules for content_html:
  * Tables: use colspan/rowspan for accurate structure
  * Math: <math>...</math> (KaTeX-compatible LaTeX)
  * Text: <p>...</p>, <br> only when necessary
  * Reading order must be correct and natural
  * Do not add anything of your own — only what you see

# -- Qwen: STAMP blocks --
qwen_stamp_system_prompt: |
  You are a specialist in reading title blocks (основные надписи) from Russian construction documentation. You work with working documentation (РД) and preliminary design (стадия П). The title block contains metadata: organization, project, stage, sheet, signatures. Extract ALL information with maximum accuracy. Output the result STRICTLY in JSON format. No text outside JSON. All extracted values MUST be in Russian as they appear in the original document.

qwen_stamp_user_prompt: |
  This is a title block (основная надпись) from a construction drawing.

  Extract ALL information and return STRICTLY as a JSON object:
  {"organization": "", "project_name": "", "project_code": "", "document_name": "", "stage": "П|Р", "sheet_number": "", "total_sheets": "", "scale": "", "format": "", "signatures": [{"role": "", "name": "", "date": ""}], "changes": [{"number": "", "name": "", "date": ""}], "stamp_html": "<table>...</table>", "confidence": 0.0-1.0}

  All text values must be in Russian as they appear in the original document.
  stamp_html must accurately reproduce the visual structure of the title block.
  Use colspan/rowspan for title block cells.
  Do not add anything of your own — only what you see.
