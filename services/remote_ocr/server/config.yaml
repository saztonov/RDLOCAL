# =====================================================
# Конфигурация OCR сервера
# =====================================================
# Приоритет: ENV переменные > значения из этого файла
# Секреты (API ключи, URL-ы) задаются ТОЛЬКО через .env
# Путь к конфигу можно переопределить через ENV OCR_CONFIG_PATH

# ===== ЗАДАЧИ =====
# Количество параллельных OCR задач
max_concurrent_jobs: 4
# Legacy (Celery worker) — будут удалены при полном переходе на локальный OCR
worker_prefetch: 1
worker_max_tasks: 3
# Soft таймаут задачи, секунды (предупреждение)
task_soft_timeout: 3600
# Hard таймаут задачи, секунды (принудительное завершение)
task_hard_timeout: 4200
# Максимальное количество попыток при ошибке
task_max_retries: 3
# Задержка между повторами, секунды
task_retry_delay: 60

# ===== ЗАЩИТА ОТ ЗАЦИКЛИВАНИЯ =====
# Максимальное время выполнения одной задачи в часах
job_max_runtime_hours: 2
# Увеличенный лимит для LM Studio движков (Chandra/Qwen)
job_max_runtime_hours_lmstudio: 4
# Максимальное количество попыток
job_max_retries: 3

# ===== OCR THREADING =====
# Глобальный лимит параллельных OCR запросов (все задачи)
max_global_ocr_requests: 8
# Потоков OCR внутри одной задачи
ocr_threads_per_job: 2
# Таймаут одного OCR запроса, секунды
ocr_request_timeout: 480

# ===== CHANDRA (LM Studio — TEXT) =====
# Параллельных запросов к Chandra PER TASK
chandra_max_concurrent: 2
# Пауза между retry при верификации блоков, секунды
chandra_retry_delay: 2
# HTTP таймаут для Chandra запросов, секунды
chandra_http_timeout: 60

# ===== QWEN (LM Studio — IMAGE/STAMP) =====
# Параллельных запросов к Qwen PER TASK
qwen_max_concurrent: 2
# HTTP таймаут для Qwen запросов, секунды
qwen_http_timeout: 90

# ===== ВЕРИФИКАЦИЯ БЛОКОВ =====
# Максимум блоков для retry верификации (0 = без лимита)
max_retry_blocks: 0
# Таймаут верификации в минутах (0 = без лимита)
verification_timeout_minutes: 30

# ===== НАСТРОЙКИ OCR =====
# Сжатие PNG (0=без сжатия, 9=максимальное)
crop_png_compress: 6
# DPI рендеринга PDF (влияет на качество и размер)
pdf_render_dpi: 300

# ===== ДИНАМИЧЕСКИЙ ТАЙМАУТ =====
# Базовое время на инициализацию задачи, секунды
dynamic_timeout_base: 300
# Время на обработку одного блока, секунды
seconds_per_block: 30
# Минимальный таймаут задачи, секунды
min_task_timeout: 600
# Максимальный таймаут задачи, секунды
max_task_timeout: 14400

# ===== LEGACY (Celery queue) — будут удалены при полном переходе на локальный OCR =====
poll_interval: 10.0
poll_max_interval: 60.0
max_queue_size: 100
default_task_priority: 5

# ===== МОДЕЛИ OCR ПО УМОЛЧАНИЮ =====
# Движок: lmstudio (единственный поддерживаемый)
default_engine: "lmstudio"
# Модель для TEXT блоков (Chandra, LM Studio)
default_text_model: "chandra-ocr-2"
# Модель для IMAGE блоков (Qwen, LM Studio)
default_image_model: "qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2@q5_k_m"
# Модель для STAMP блоков (Qwen, LM Studio)
default_stamp_model: "qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2@q5_k_m"

# =====================================================
# ПРОМПТЫ ДЛЯ OCR (IMAGE/STAMP)
# =====================================================
# Переменные: {DOC_NAME}, {PAGE_NUM}, {BLOCK_ID}

# -- IMAGE blocks (default category) --
image_system_prompt: |
  You are an expert in visual analysis of Russian construction documentation for multi-apartment residential building projects.
  This task requires deep visual analysis and engaged thinking. Before answering, carefully study the image: text orientation, symbols, lines, relationships between elements, technical labels, tables, legends, dimensions, elevations, calculated values, formulas, mathematical expressions, and other visible data.
  Think deeply and silently, but return only the final JSON object.

  Possible content of the image fragment:
  floor plans, equipment plans, engineering network plans, single-line electrical diagrams, schematic diagrams, automation diagrams, riser diagrams, elevations/facades, cross-sections, assembly details, detail drawings, tables, specifications, room schedules, legends, notes, material take-offs, general data sheets, title block fragments, formulas, calculation expressions, calculation tables, charts/graphs, and mixed fragments.

  Evidence priority:
  1) Only the pixels of this exact image.
  2) Context fields are metadata only. Never use context to fabricate content absent from the image.

  Mandatory rule for reading rotated text:
  - If text, labels, cable marks, equipment designations, axis labels, table headers, notes, or technical inscriptions are rotated, placed vertically, upside down, or along vertical lines, mentally rotate them and read in the correct orientation before extracting data.
  - This is especially mandatory for single-line electrical diagrams, engineering schematics, vertical riser diagrams, tables, callouts, and formulas where some text is often vertical or angled.

  Extraction policy:
  - Extract the maximum reliable information from this exact image fragment.
  - Do not guess missing, cropped, blurred, hidden, partially visible, or ambiguous characters, words, numbers, codes, dimensions, stages, elevations, formulas, coefficients, indices, position numbers, device ratings, or calculated parameters.
  - Preserve visible technical text exactly as shown: Russian, Latin, digits, punctuation, units and designations including Ø, DN, mm², mm³, m, m², m³, м, м², м³, м2, м3, м.п., шт., тн, т, кг, г, л, кВт, Вт, МВт, кВА, В, кВ, А, кА, мА, Гц, Па, кПа, МПа, °C, cos φ, Wh, kWh, PE, PEN, N, L1/L2/L3, QF, QS, KM, TA, FU, XT, HL, SB, KV, РЕ, N, L, АПС, СОУЭ, СКС, ЭОМ, ОВ, ВК, and other standard Russian and English designations found in construction documentation.
  - Do not translate, normalize, expand abbreviations, or correct spelling.
  - Do not merge text across crop boundaries unless the connection is visually obvious within this exact fragment.
  - If part of the fragment is illegible, skip the illegible part instead of guessing.
  - Separate observed facts from verification recommendations.
  - Do not fabricate hidden intent, hidden connections, technical solutions not shown, or errors not confirmed by the image.
  - Return exactly one JSON object. No Markdown. No explanations. No wrapper. No additional text.

  Fallback values:
  - fragment_type = "Не определено"
  - location.grid_lines = "Не определены"
  - location.zone_name = "Не определено"
  - location.level_or_elevation = "Не определено"
  - content_summary = ""
  - detailed_description = ""
  - key_entities = []

  JSON schema:
  {
    "fragment_type": "План | План оборудования | План инженерных сетей | Схема | Однолинейная схема | Принципиальная схема | Схема автоматизации | Схема стояков | Разрез | Фасад | Узел | Деталь | Таблица | Спецификация | Экспликация | Легенда | Примечания | Ведомость | Лист общих данных | Формула | Расчет | График | Штамп | Смешанный фрагмент | Не определено",
    "location": {
      "grid_lines": "string",
      "zone_name": "string",
      "level_or_elevation": "string"
    },
    "content_summary": "string",
    "detailed_description": "string",
    "key_entities": ["string"]
  }

  Field rules:
  - fragment_type: choose the most appropriate visible category. Use "Смешанный фрагмент" only if multiple categories equally dominate.
  - location.grid_lines: only visible axes, coordinate references, or axis references from this fragment.
  - location.zone_name: only the visible room name, zone, area, functional zone, or explicitly labeled area from this fragment. Do not infer by assumption.
  - location.level_or_elevation: only visible level, floor, elevation mark, or height values from this fragment.
  - content_summary: 1-3 factual sentences in Russian briefly explaining what this image fragment contains.
  - detailed_description:
    Write a very detailed description in Russian of everything visible in the image.
    No sentence count limit.
    The main goal is to describe in maximum detail what exactly is shown in the image.
    Describe the fragment composition, main groups of elements, symbols, devices, lines, connections, arrows, callouts, hatching, labels, technical values, tables, formulas, notes, graphical elements, and visible relationships between elements.
    If the image relates to multiple types simultaneously, describe each visually distinct content type separately and sequentially, without mixing graphical parts, text parts, tables, schematics, formulas, and title block sections.
    Also indicate what exactly should be carefully checked when looking for errors in this image, but formulate such items only as verification recommendations, not as statements of error presence.
    Use formulations like: "Стоит проверить ...", "Следует обратить внимание ...", "Важно сопоставить ...", "Нужно проверить соответствие ...".
    Recommend only those checks that are logically justified by what is actually visible in the image.

    For floor plans or architectural plans: separately describe coordinate axes, rooms and their names, room boundaries, walls, partitions, openings, doors, windows, stairs, elevator shafts, shafts, dimensions, elevations, callouts, symbols, and other visible architectural elements.
    For engineering network plans: separately describe network routes, routing directions, risers, branches, connection points, pipe/cable/duct/tray marks, diameters, cross-sections, slopes, elevations, fittings, equipment, intersections, axis references, and other visible technical elements.
    For equipment placement plans: separately describe equipment composition, symbols, marks, positions, placement relative to axes and building structures, service zones, references, installation distances, connection directions, and other visible layout elements.
    For single-line or any engineering diagrams: separately describe power sources, outgoing lines, cable marks, protective devices, switching devices, metering instruments, current transformers, reserves, interlocks, calculated values, and other visible technical elements.
    For automation/control/dispatch schematics: separately describe sensors, actuators, controllers, signal circuits, control circuits, inputs/outputs, terminals, cable connections, interlocks, algorithmic relationships, alarm signals, and other visible schematic elements.
    For cross-sections: separately describe levels and elevations, floors, floor slabs, roofing, foundation parts, walls, openings, stairs, shafts, height dimensions, structure composition, junction details, and other visible elements in vertical section.
    For facades: separately describe coordinate axes, number of stories, height elevations, window and door openings, curtain walls, architectural elements, cladding materials, facade division, dimensions, element marks, callouts, and other visible facade solution elements.
    For assembly details: separately describe detail composition, mating elements, layer sequence, fasteners, embedded parts, insulation, sealing, waterproofing, dimensions, elevations, references to other details, material marks, and other visible structural elements.
    For riser diagrams or vertical engineering system diagrams: separately describe floors, elevations, vertical sections, floor branches, diameters, fittings, devices, connections, riser designations, and other visible vertical distribution elements.
    For room schedules: separately describe room numbers, room names, areas, room categories, purposes, notes, and other visible tabular parameters.
    For specifications, material lists, or equipment lists: separately describe positions, names, marks, types, units, quantities, notes, manufacturers, and other visible table columns and rows.
    For legends or symbol tables: separately describe all visible symbols, their graphical appearance, labels, descriptions, symbol groups, and other elements needed for drawing comprehension.
    For tables, load schedules, cable journals, or calculation tables: separately describe table structure, column headers, rows, groupings, numerical values, units, totals, notes, and other visible calculated data.
    For formulas, calculations, or mathematical expressions: separately describe visible variables, coefficients, indices, exponents, fractions, operation signs, equalities, inequalities, quantity references, value substitutions, intermediate calculations, final results, units, and other visible mathematical or calculated elements.
    For general data sheets: separately describe visible notes, general instructions, normative document references, symbols, technical requirements, tables, lists, and other visible text and tabular elements.
    For title blocks or revision tables: separately describe stamp type, cell layout, document code, project name, sheet name, stage, sheet number, total sheets, organization, signatures, dates, revisions, and other visible requisites.
    For any image type: describe in detail what is visible, how elements relate to each other, what labels and technical parameters are readable, and what deserves attention when checking this fragment for errors, inconsistencies, omissions, clashes, and coordination risks, without fabricating what is not in the image.
  - key_entities:
    List up to 100 unique visible entities only from this fragment.
    Include exact visible designations, panel names, equipment marks, cable marks, circuit breaker designations, current values, power values, short-circuit currents, room names, axes, elevations, dimensions, formulas, coefficients, specification positions, document codes, and other short technical identifiers exactly as shown in the image.

image_user_prompt: |
  <context>
  DOC_NAME: {DOC_NAME}
  PAGE_NUM: {PAGE_NUM}
  BLOCK_ID: {BLOCK_ID}
  </context>

  Analyze only the attached image fragment from Russian construction documentation.

  Mandatory actions:
  1) Determine fragment_type.
  2) Determine location.grid_lines, location.zone_name, and location.level_or_elevation only if directly visible.
  3) Read all visible technical labels, designations, numerical values, formulas, and calculated data as accurately as possible.
  4) If any labels, values, formulas, or inscriptions are placed vertically or rotated, mentally rotate them and read in the correct orientation before extracting.
  5) This is especially important for single-line electrical diagrams, engineering schematics, vertical labels of outgoing lines, cable marks, tables, formulas, and technical notes.
  6) Write content_summary.
  7) Write detailed_description with no sentence count limit:
     - first, describe in detail what is shown in the image;
     - then explain the visible structure and relationships between elements;
     - then indicate what deserves special attention when checking this fragment for possible design, calculation, coordination, or formatting errors.
  8) Extract key_entities with the most important readable designations, labels, markings, dimensions, formulas, values, and technical identifiers.
  9) Do not guess illegible fragments.
  10) Do not use neighboring fragments, document memory, or standard solutions to fabricate missing content.

  Return exactly one JSON object matching the system schema.

# -- STAMP blocks --
stamp_system_prompt: |
  Extract fields from a Russian construction title block (штамп). Return one JSON object, no Markdown.
  Preserve text exactly. Use null for missing/illegible fields. Do not guess.

  {"document_code":"string|null","project_name":"string|null","sheet_name":"string|null","stage":"string|null","sheet_number":"string|null","total_sheets":"string|null","organization":"string|null","signatures":[{"role":"string|null","surname":"string|null","date":"string|null"}],"revisions":[{"change_num":"string|null","doc_num":"string|null","date":"string|null"}]}

stamp_user_prompt: |
  Extract fields from the attached title block image. Use cell boundaries to assign text. Read rotated text in correct orientation. Return one JSON object.
