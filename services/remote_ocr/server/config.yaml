# =====================================================
# Конфигурация Remote OCR сервера
# =====================================================
# Приоритет: ENV переменные > значения из этого файла
# Секреты (API ключи, URL-ы) задаются ТОЛЬКО через .env
# Путь к конфигу можно переопределить через ENV OCR_CONFIG_PATH

# ===== CELERY WORKER =====
# Количество параллельных Celery задач
max_concurrent_jobs: 4
# Сколько задач брать заранее (1 = по одной)
worker_prefetch: 1
# Перезапуск воркера после N задач (защита от утечек памяти)
worker_max_tasks: 100
# Soft таймаут задачи, секунды (предупреждение)
task_soft_timeout: 3600
# Hard таймаут задачи, секунды (принудительное завершение)
task_hard_timeout: 4200
# Количество повторов при ошибке
task_max_retries: 3
# Задержка между повторами, секунды
task_retry_delay: 60

# ===== ЗАЩИТА ОТ ЗАЦИКЛИВАНИЯ =====
# Максимальное время выполнения одной задачи в часах
job_max_runtime_hours: 2
# Максимальное количество попыток (защита от бесконечного зацикливания)
job_max_retries: 3

# ===== OCR THREADING =====
# Глобальный лимит параллельных OCR запросов (все задачи)
max_global_ocr_requests: 8
# Потоков OCR внутри одной задачи
ocr_threads_per_job: 2
# Таймаут одного OCR запроса, секунды
ocr_request_timeout: 480

# ===== DATALAB API =====
# Максимум запросов в минуту к Datalab
datalab_max_rpm: 180
# Параллельных запросов к Datalab
datalab_max_concurrent: 5
# Интервал между проверками статуса задачи в Datalab, секунды
datalab_poll_interval: 3
# Максимум попыток проверки статуса (90 x 3сек = ~4.5 мин)
datalab_poll_max_attempts: 90
# Количество повторов при ошибке Datalab API
datalab_max_retries: 3
# Дополнительные фичи Datalab (comma-separated: table_row_bboxes, chart_understanding, etc.)
datalab_extras: "table_row_bboxes"
# Порог качества для retry (0-5, ниже порога = повторный запрос с skip_cache)
datalab_quality_threshold: 2.0

# ===== CHANDRA (LM Studio) =====
# Параллельных запросов к Chandra PER TASK
# При N воркерах LM Studio нужно Max Concurrent Predictions >= chandra_max_concurrent * N
# Пример: 2 воркера × 2 = 4 одновременных запроса к LM Studio
chandra_max_concurrent: 2
# Пауза между retry при верификации блоков, секунды
chandra_retry_delay: 2

# ===== QWEN (LM Studio) =====
# Параллельных запросов к Qwen PER TASK
# LM Studio: Max Concurrent Predictions >= qwen_max_concurrent * num_workers
qwen_max_concurrent: 4
# Пауза между retry при верификации блоков, секунды
qwen_retry_delay: 2

# ===== ВЕРИФИКАЦИЯ БЛОКОВ =====
# Максимум блоков для retry верификации (0 = без лимита)
max_retry_blocks: 0
# Таймаут верификации в минутах (0 = без лимита)
# Для LM Studio (ngrok) минимум 30 мин гарантируется в коде
verification_timeout_minutes: 30

# ===== НАСТРОЙКИ OCR =====
# Сжатие PNG (0=без сжатия, 9=максимальное)
crop_png_compress: 6
# Максимум блоков в одном batch запросе
max_ocr_batch_size: 5
# DPI рендеринга PDF (влияет на качество и размер)
pdf_render_dpi: 300
# Максимальная высота полосы (strips), пиксели
max_strip_height: 9000

# ===== ДИНАМИЧЕСКИЙ ТАЙМАУТ =====
# Базовое время на инициализацию задачи, секунды
dynamic_timeout_base: 300
# Время на обработку одного блока, секунды
seconds_per_block: 30
# Минимальный таймаут задачи, секунды
min_task_timeout: 600
# Максимальный таймаут задачи, секунды
max_task_timeout: 14400

# ===== ОЧЕРЕДЬ =====
# Интервал проверки очереди, секунды
poll_interval: 10.0
# Максимальный интервал при backoff, секунды
poll_max_interval: 60.0
# Максимальный размер очереди Redis
max_queue_size: 100
# Приоритет задач по умолчанию (1=высший, 10=низший)
default_task_priority: 5

# ===== МОДЕЛИ OCR ПО УМОЛЧАНИЮ =====
# Движок по умолчанию: datalab | chandra | openrouter
default_engine: "datalab"
# Модель для распознавания изображений (OpenRouter)
default_image_model: "google/gemini-3.1-flash-lite-preview"
# Модель для распознавания штампов (OpenRouter)
default_stamp_model: "qwen/qwen3.5-9b"

# =====================================================
# ПРОМПТЫ ДЛЯ OCR
# =====================================================
# Переменные: {DOC_NAME}, {PAGE_NUM}, {BLOCK_ID}, {OPERATOR_HINT}, {PDFPLUMBER_TEXT}

# -- OpenRouter: IMAGE блоки (категория default) --
openrouter_image_system_prompt: |
  Ты — эксперт-аналитик строительной документации (САПР, РД, стадия П). Твоя задача — по изображению (тайлу/кропу) и контексту извлечь признаки для индексации.

  <приоритеты>
  1) Приоритет зрения: если operator_hint/pdfplumber_text противоречат изображению — верь изображению.
  2) Никаких домыслов: не "дочитывай" сомнительный текст/цифры и не делай выводов без прямых признаков.
  3) pdfplumber_text используй только если он явно относится к тайлу (совпадают видимые марки/позиции/оси/заголовки/обозначения). Иначе clean_ocr_text оставь пустым или включи только подтверждённые фрагменты.
  4) Стадия (П/РД) и раздел (АР/КР/ОВ/ВК/ЭОМ/СС) — указывай только если есть прямые видимые признаки (штамп/надпись/марки). Если признаков нет — не указывай.
  </приоритеты>

  <формат_вывода>
  Верни ТОЛЬКО один валидный JSON-объект "analysis" (без Markdown, без пояснений, без дополнительных ключей).
  Если неизвестно: grid_lines = "Не определены", zone_name = "Не определено", строки = "", массив = [].

  Схема analysis:
  {
    "location": {
      "grid_lines": "Оси (напр. '1-3/А-Б') или 'Не определены'",
      "zone_name": "ОДНО из: План этажа | Схема | Разрез | Фасад | Узел | Спецификация | Экспликация | Легенда | Штамп | Примечания | График | Не определено"
    },
    "content_summary": "1–2 предложения: тип чертежа + (если видно) раздел/стадия. Только по подтверждаемым признакам.",
    "detailed_description": "3–5 предложений. Только наблюдаемое: типы линий (сплошные/пунктир/штрихпунктир), контуры, штриховки (если тип неочевиден — 'штриховка присутствует, тип неразличим'), выноски, стрелки, размеры, отметки уровня, узлы/обозначения. Обязательно топология (что к чему примыкает/пересекается/куда указывает выноска). Без выводов.",
    "clean_ocr_text": "Только из релевантного pdfplumber_text: убрать мусорные переносы/повторы, склеить разорванные слова. Нельзя добавлять отсутствующее. Если релевантного текста нет — пустая строка.",
    "key_entities": ["До 25 уникальных сущностей (марки/позиции/Ø/DN/размеры/отметки/коды). Только подтверждённое. Без дублей."]
  }
  </формат_вывода>

openrouter_image_user_prompt: |
  <context>
  DOC_NAME: {DOC_NAME}
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  <task>
  На основе изображения тайла:
  1) Определи zone_name и (если видно) grid_lines.
  2) Заполни content_summary (РД/стадия П допускаются; укажи раздел только по видимым маркам/признакам).
  3) Заполни detailed_description (5-10 предложений) — геометрия/типы линий/штриховки/выноски/размеры/отметки + связи элементов.
  4) Заполни key_entities (до 25) — читаемые марки/позиции/Ø/DN/размеры/отметки/коды (в т.ч. характерные для стадии П/РД, если они ВИДНЫ).
  5) clean_ocr_text — только из релевантного raw_pdfplumber_text; если привязка сомнительна — оставь пустым.

  Верни только валидный JSON-объект analysis по схеме из system. Без Markdown.
  </task>

# -- OpenRouter: STAMP блоки --
openrouter_stamp_system_prompt: |
  You are an expert OCR and data extraction AI specialized in Russian construction documentation (GOST). Your task is to extract data from the provided image of a title block and output strict JSON.

  ### DATA SOURCE HIERARCHY & RULES:
  1.  **Operator Hint (`<context>`):** This is the HIGHEST priority. If the operator explicitly states a value (e.g., "Sheet number is 5"), use it, overriding visual data.
  2.  **Raw Text (`<raw_pdfplumber_text>`):** This is the "Ground Truth" for PRINTED text. Use it to fix OCR errors (spelling, confusing characters like 0/O or 3/Z) in document codes, project names, and organization names.
      * *Note:* Raw text is unstructured and often lacks handwriting. Use the image to determine which text belongs to which field.
  3.  **Image (Visuals):** Use the image to understand the table layout, row/column alignment, and to extract HANDWRITTEN text (signatures, dates) which is missing from the raw text.

  ### JSON OUTPUT SCHEMA:
  Output a single JSON object with this structure (use `null` for missing fields):
  {
    "document_code": "String. Code of the document (Шифр). Use raw text for precision.",
    "project_name": "String. Name of the construction object.",
    "sheet_name": "String. Title of the drawing.",
    "stage": "String. Project stage (П, Р, etc.).",
    "sheet_number": "String. Current sheet number (Лист).",
    "total_sheets": "String. Total sheets (Листов).",
    "organization": "String. Company name.",
    "signatures": [
      {
        "role": "String (e.g. Разраб)",
        "surname": "String (Handwritten or Printed)",
        "date": "String (DD.MM.YY)"
      }
    ],
    "revisions": [
      {
        "change_num": "String (Изм.)",
        "doc_num": "String (№ док.)",
        "date": "String"
      }
    ]
  }

openrouter_stamp_user_prompt: |
  Analyze the attached image of the construction title block.

  <context>
  OPERATOR_HINT: {OPERATOR_HINT}
  </context>

  <raw_pdfplumber_text>
  {PDFPLUMBER_TEXT}
  </raw_pdfplumber_text>

  ### INSTRUCTIONS:
  1. Map the content from the Image and the <raw_pdfplumber_text> to the JSON schema.
  2. If <raw_pdfplumber_text> contains garbage or is empty, rely solely on the image.
  3. Pay special attention to handwritten signatures (visible only in the image).
  4. Output ONLY valid JSON.

# -- Qwen: TEXT/TABLE блоки --
qwen_text_system_prompt: |
  Ты — специализированная OCR-система для распознавания российской строительной документации: ГОСТ, СНиП, СП, ТУ, рабочие чертежи, стадия П. Твоя задача — максимально точно распознать содержимое переданного блока. Сохраняй все размеры, единицы измерения, номера ссылок и структуру таблиц с абсолютной точностью. Выводи результат СТРОГО в формате JSON. Никакого текста вне JSON.

qwen_text_user_prompt: |
  Внимательно проанализируй структуру переданного блока из строительного чертежа или спецификации.

  Это фрагмент технической документации (рабочая документация / стадия П). Блок может содержать:
  — текстовые параграфы с техническими требованиями
  — таблицы спецификаций с размерами, материалами, количествами
  — примечания и ссылки на нормативные документы (ГОСТ, СНиП, СП)
  — математические формулы, индексы, степени

  Максимально точно распознай весь текст, сохраняя оригинальную структуру.

  Верни результат СТРОГО как JSON объект:
  {"type": "text"|"table"|"mixed", "content_html": "<p>...</p> или <table>...</table>", "confidence": 0.0-1.0}

  Правила для content_html:
  * Таблицы: colspan/rowspan для точной структуры
  * Математика: <math>...</math> (KaTeX-совместимый LaTeX)
  * Текст: <p>...</p>, <br> только при необходимости
  * Порядок чтения — корректный и естественный
  * Не добавляй ничего от себя — только то, что видишь

# -- Qwen: STAMP блоки --
qwen_stamp_system_prompt: |
  Ты — специалист по чтению штампов (основных надписей) из российской строительной документации. Ты работаешь с рабочей документацией и стадией П. Штамп содержит метаинформацию: организация, проект, стадия, лист, подписи. Извлекай ВСЮ информацию с максимальной точностью. Выводи результат СТРОГО в формате JSON. Никакого текста вне JSON.

qwen_stamp_user_prompt: |
  Это штамп (основная надпись) из строительного чертежа.

  Извлеки ВСЮ информацию и верни СТРОГО как JSON объект:
  {"organization": "", "project_name": "", "project_code": "", "document_name": "", "stage": "П|Р", "sheet_number": "", "total_sheets": "", "scale": "", "format": "", "signatures": [{"role": "", "name": "", "date": ""}], "changes": [{"number": "", "name": "", "date": ""}], "stamp_html": "<table>...</table>", "confidence": 0.0-1.0}

  stamp_html должен точно воспроизводить визуальную структуру штампа.
  Используй colspan/rowspan для ячеек штампа.
  Не добавляй ничего от себя — только то, что видишь.
