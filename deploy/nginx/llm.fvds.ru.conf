# Nginx конфигурация для VDS (llm.fvds.ru)
# Устанавливается на VDS, проксирует на локальный ПК через Tailscale
#
# Маршрут: Интернет → VDS (Nginx + TLS) → Tailscale → ПК:8000 → Docker
#
# Установка:
#   1. sudo cp llm.fvds.ru.conf /etc/nginx/sites-available/llm.fvds.ru
#   2. sudo ln -s /etc/nginx/sites-available/llm.fvds.ru /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d llm.fvds.ru
#   4. sudo nginx -t && sudo systemctl reload nginx

# Замените на Tailscale IP вашего ПК
upstream backend {
    server 100.64.1.10:8000;  # Tailscale IP локального ПК с Docker
}

server {
    listen 443 ssl http2;
    server_name llm.fvds.ru;

    # SSL сертификаты (certbot заполнит автоматически)
    ssl_certificate     /etc/letsencrypt/live/llm.fvds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.fvds.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Общие настройки proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Таймауты для длинных OCR запросов
    proxy_connect_timeout 10s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Максимальный размер загружаемого файла (PDF)
    client_max_body_size 100M;

    # WebSocket для OCR прогресса
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # API и всё остальное → backend
    location / {
        proxy_pass http://backend;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name llm.fvds.ru;
    return 301 https://$host$request_uri;
}
