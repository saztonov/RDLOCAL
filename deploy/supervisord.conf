[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:lmstudio]
command=lms server start --port 1234
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=5
stdout_logfile=/var/log/supervisor/lmstudio.log
stderr_logfile=/var/log/supervisor/lmstudio_err.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
priority=100

[program:backend]
command=python -m uvicorn services.remote_ocr.server.main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/supervisor/backend.log
stderr_logfile=/var/log/supervisor/backend_err.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
environment=CHANDRA_BASE_URL="http://localhost:1234",QWEN_BASE_URL="http://localhost:1234"
priority=200
