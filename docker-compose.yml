services:
  web:
    build:
      context: .
      dockerfile: services/remote_ocr/Dockerfile
    command: uvicorn services.remote_ocr.server.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:1234:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - LMSTUDIO_AUTH_USER=${LMSTUDIO_AUTH_USER}
      - LMSTUDIO_AUTH_PASSWORD=${LMSTUDIO_AUTH_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ocr_data:/data
    depends_on:
      - redis
    restart: always
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    mem_limit: 256m

  worker:
    build:
      context: .
      dockerfile: services/remote_ocr/Dockerfile
    command: celery -A services.remote_ocr.server.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - LMSTUDIO_AUTH_USER=${LMSTUDIO_AUTH_USER}
      - LMSTUDIO_AUTH_PASSWORD=${LMSTUDIO_AUTH_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ocr_data:/data
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  local-ocr:
    build:
      context: .
      dockerfile: services/local_ocr/Dockerfile
    command: python -m services.local_ocr --port 18100
    ports:
      - "127.0.0.1:18100:18100"
    env_file:
      - .env
    environment:
      - REMOTE_OCR_DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ocr_data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  redis_data:
  ocr_data:
